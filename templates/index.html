<!DOCTYPE html>
<html>
<style>
    body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; padding: 50px; }
    form { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
    input, select, button { margin: 10px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
    button { background-color: #004a99; color: white; cursor: pointer; border: none; }
    button:hover { background-color: #003366; }
    h2 { color: #004a99; }
</style>
<head>
  <title>Calculadora Tecmilenio</title>
</head>
<body>

<h1>Calculadora</h1>

<img src="Logo.png" width="150">

<form method="POST">
  <input type="number" name="a" required>
  <input type="number" name="b" required>

  <select name="op">
    <option value="+">Suma</option>
    <option value="-">Resta</option>
    <option value="*">Multiplicación</option>
    <option value="/">División</option>
    <option value="bin">Binario</option>
    <option value="and">AND</option>
    <option value="or">OR</option>
    <option value="xor">XOR</option>
  </select>

  <button type="submit">Calcular</button>
</form>

{% if resultado %}
<h2>Resultado: {{ resultado }}</h2>
{% endif %}

</body>
</html>
